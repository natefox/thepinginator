<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pinginator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 1.5rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  .header h1 { font-size: 1.6rem; font-weight: 700; }
  .header h1 .ping { color: #60a5fa; }
  .header h1 .inator { color: #888; }
  .header-meta { display: flex; align-items: center; gap: 1.25rem; color: #888; font-size: 0.85rem; }
  .refresh-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    margin-right: 0.35rem;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Host Cards */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .card {
    background: #161b22;
    border: 1px solid #2a2f3a;
    border-left: 4px solid #2a2f3a;
    border-radius: 8px;
    padding: 1rem 1.1rem;
  }
  .card-host { font-size: 0.8rem; color: #888; margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-rtt { font-size: 2rem; font-weight: 700; line-height: 1.15; }
  .card-rtt .unit { font-size: 0.85rem; color: #888; font-weight: 400; }
  .card-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 0.4rem 0;
    color: #0f1117;
  }
  .card-stats { font-size: 0.75rem; color: #888; line-height: 1.6; }
  .card-sparkline { margin-top: 0.5rem; }
  .card-sparkline svg { width: 100%; height: 32px; }

  /* Time range buttons */
  .controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .controls label { color: #888; font-size: 0.85rem; margin-right: 0.25rem; }
  .range-btn {
    background: #161b22;
    border: 1px solid #2a2f3a;
    color: #888;
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .range-btn:hover { border-color: #60a5fa; color: #e0e0e0; }
  .range-btn.active { background: #60a5fa; color: #0f1117; border-color: #60a5fa; font-weight: 600; }

  /* Charts */
  .chart-container {
    background: #161b22;
    border: 1px solid #2a2f3a;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1.5rem;
  }
  .chart-title { font-size: 0.9rem; color: #888; margin-bottom: 0.75rem; }
  .chart-wrap { position: relative; width: 100%; height: 300px; }
  .chart-wrap canvas { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>

<div class="header">
  <h1><span class="ping">ping</span><span class="inator">inator</span></h1>
  <div class="header-meta">
    <span id="host-count">0 hosts</span>
    <span><span class="refresh-dot"></span>Refresh in <span id="countdown">12</span>s</span>
  </div>
</div>

<div class="cards-grid" id="cards"></div>

<div class="controls">
  <label>Time range:</label>
  <button class="range-btn" data-range="1h">1h</button>
  <button class="range-btn active" data-range="24h">24h</button>
  <button class="range-btn" data-range="7d">7d</button>
  <button class="range-btn" data-range="30d">30d</button>
</div>

<div class="chart-container">
  <div class="chart-title">Latency (ms)</div>
  <div class="chart-wrap"><canvas id="latencyChart"></canvas></div>
</div>

<div class="chart-container">
  <div class="chart-title">Packet Loss (%)</div>
  <div class="chart-wrap"><canvas id="lossChart"></canvas></div>
</div>

<script>
const HOST_COLORS = ['#4ade80','#60a5fa','#facc15','#f87171','#c084fc','#fb923c','#22d3ee','#f472b6'];
const STATUS_COLORS = { normal:'#4ade80', elevated:'#facc15', high:'#f87171', down:'#f87171', insufficient_data:'#888' };
const REFRESH_INTERVAL = 12;

let selectedRange = '24h';
let hosts = [];
let latencyChart = null;
let lossChart = null;
let countdown = REFRESH_INTERVAL;

// --- Chart.js defaults ---
Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#2a2f3a';

// --- Helpers ---
function statusColor(s) { return STATUS_COLORS[(s || '').toLowerCase()] || '#888'; }
function statusLabel(s) { return (s || 'UNKNOWN').toUpperCase().replace('_', ' '); }
function fmt(v, d) { return v == null ? '—' : Number(v).toFixed(d != null ? d : 1); }

function isAggregated() { return selectedRange === '7d' || selectedRange === '30d'; }

function formatLabel(val) {
  if (isAggregated()) {
    // val is an hour string like "2026-03-24T10" or a date
    if (typeof val === 'string' && val.length >= 10) {
      return val.slice(5, 10).replace('-', '/');
    }
    return val;
  }
  // val is a Unix timestamp in seconds
  const d = new Date(val * 1000);
  if (isNaN(d)) return val;
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

// --- Sparkline ---
function sparklineSVG(data, color) {
  if (!data || data.length < 2) return '';
  const vals = data.map(d => d.rtt_ms != null ? d.rtt_ms : (d.avg_ms != null ? d.avg_ms : null)).filter(v => v != null);
  if (vals.length < 2) return '';
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const w = 200, h = 32, pad = 2;
  const pts = vals.slice(-20).map((v, i, a) => {
    const x = pad + (i / (a.length - 1)) * (w - 2 * pad);
    const y = h - pad - ((v - min) / range) * (h - 2 * pad);
    return `${x},${y}`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// --- Cards ---
function renderCards(hostsData) {
  const el = document.getElementById('cards');
  document.getElementById('host-count').textContent = hostsData.length + ' host' + (hostsData.length !== 1 ? 's' : '');
  el.innerHTML = hostsData.map((h, i) => {
    const sc = statusColor(h.status);
    const rtt = h.current_rtt_ms;
    return `<div class="card" style="border-left-color:${sc}" data-host="${h.host}">
      <div class="card-host">${h.host}</div>
      <div class="card-rtt">${rtt != null ? fmt(rtt, 1) : '—'} <span class="unit">ms</span></div>
      <span class="card-badge" style="background:${sc}">${statusLabel(h.status)}</span>
      <div class="card-stats">
        24h avg: ${fmt(h.avg_24h_ms)} ms &middot; &sigma;: ${fmt(h.stddev_24h_ms)} ms<br>
        loss: ${fmt(h.loss_24h_pct)}%
      </div>
      <div class="card-sparkline" id="spark-${i}"></div>
    </div>`;
  }).join('');
}

// --- Charts ---
function createLatencyChart() {
  const ctx = document.getElementById('latencyChart').getContext('2d');
  latencyChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { usePointStyle: true, boxWidth: 8 } } },
      scales: {
        x: { grid: { color: '#2a2f3a' }, ticks: { maxTicksLimit: 12 } },
        y: { grid: { color: '#2a2f3a' }, beginAtZero: true, title: { display: true, text: 'ms' } }
      }
    }
  });
}

function createLossChart() {
  const ctx = document.getElementById('lossChart').getContext('2d');
  lossChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { usePointStyle: true, boxWidth: 8 } } },
      scales: {
        x: { grid: { color: '#2a2f3a' }, ticks: { maxTicksLimit: 12 } },
        y: { grid: { color: '#2a2f3a' }, beginAtZero: true, title: { display: true, text: '%' },
             suggestedMax: 5 }
      }
    }
  });
}

function buildLatencyDatasets(allHistory) {
  const datasets = [];
  const hostNames = Object.keys(allHistory);

  hostNames.forEach((host, i) => {
    const hist = allHistory[host];
    const color = HOST_COLORS[i % HOST_COLORS.length];
    const agg = isAggregated();

    datasets.push({
      label: host,
      data: hist.data.map(d => agg ? d.avg_ms : d.rtt_ms),
      borderColor: color,
      backgroundColor: color,
      pointRadius: 0,
      tension: 0.2,
      borderWidth: 2
    });

    // Sigma band (only for non-aggregated with baseline)
    if (!agg && hist.baseline && hist.baseline.mean_ms != null && hist.baseline.stddev_ms != null) {
      const mean = hist.baseline.mean_ms;
      const sigma = hist.baseline.stddev_ms;
      const len = hist.data.length;
      datasets.push({
        label: host + ' +1\u03C3',
        data: Array(len).fill(mean + sigma),
        borderColor: 'transparent',
        backgroundColor: 'rgba(74,222,128,0.10)',
        pointRadius: 0,
        borderWidth: 0,
        fill: '+1',
        hidden: false
      });
      datasets.push({
        label: host + ' -1\u03C3',
        data: Array(len).fill(mean - sigma),
        borderColor: 'transparent',
        backgroundColor: 'rgba(74,222,128,0.10)',
        pointRadius: 0,
        borderWidth: 0,
        fill: false,
        hidden: false
      });
    }
  });
  return datasets;
}

function buildLossDatasets(allHistory) {
  const hostNames = Object.keys(allHistory);
  return hostNames.map((host, i) => {
    const hist = allHistory[host];
    const color = HOST_COLORS[i % HOST_COLORS.length];
    const agg = isAggregated();
    return {
      label: host,
      data: hist.data.map(d => {
        if (agg) return d.loss_pct != null ? d.loss_pct : 0;
        return d.success === 0 ? 100 : 0;
      }),
      borderColor: color,
      backgroundColor: color,
      pointRadius: 0,
      tension: 0.2,
      borderWidth: 2
    };
  });
}

function buildLabels(allHistory) {
  const first = Object.values(allHistory)[0];
  if (!first) return [];
  const agg = isAggregated();
  return first.data.map(d => {
    if (agg) return formatLabel(d.hour || '');
    return formatLabel(d.timestamp || '');
  });
}

function updateCharts(allHistory) {
  const labels = buildLabels(allHistory);

  // Filter sigma-band datasets from legend
  const latencyDatasets = buildLatencyDatasets(allHistory);
  latencyChart.data.labels = labels;
  latencyChart.data.datasets = latencyDatasets;
  latencyChart.options.plugins.legend.labels.filter = function(item) {
    return !(item.text.includes('+1\u03C3') || item.text.includes('-1\u03C3'));
  };
  latencyChart.update('none');

  lossChart.data.labels = labels;
  lossChart.data.datasets = buildLossDatasets(allHistory);
  lossChart.update('none');
}

// --- Sparklines from history ---
function updateSparklines(allHistory) {
  hosts.forEach((h, i) => {
    const el = document.getElementById('spark-' + i);
    if (!el) return;
    const hist = allHistory[h.host];
    if (!hist) return;
    const color = HOST_COLORS[i % HOST_COLORS.length];
    el.innerHTML = sparklineSVG(hist.data, color);
  });
}

// --- Data fetching ---
async function fetchHosts() {
  try {
    const res = await fetch('/api/hosts');
    if (!res.ok) return;
    hosts = await res.json();
    renderCards(hosts);
  } catch (e) { console.error('Failed to fetch hosts', e); }
}

async function fetchAllHistory() {
  if (hosts.length === 0) return {};
  const results = {};
  await Promise.all(hosts.map(async (h) => {
    try {
      const res = await fetch(`/api/history/${encodeURIComponent(h.host)}?range=${selectedRange}`);
      if (!res.ok) return;
      results[h.host] = await res.json();
    } catch (e) { console.error('Failed to fetch history for', h.host, e); }
  }));
  return results;
}

async function refresh() {
  await fetchHosts();
  const history = await fetchAllHistory();
  updateCharts(history);
  updateSparklines(history);
}

// --- Countdown timer ---
function startCountdown() {
  countdown = REFRESH_INTERVAL;
  document.getElementById('countdown').textContent = countdown;
  const timer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(timer);
      refresh().then(() => startCountdown());
      return;
    }
    document.getElementById('countdown').textContent = countdown;
  }, 1000);
}

// --- Range buttons ---
document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRange = btn.dataset.range;
    // Immediate refresh on range change
    fetchAllHistory().then(history => {
      updateCharts(history);
      updateSparklines(history);
    });
  });
});

// --- Init ---
createLatencyChart();
createLossChart();
refresh().then(() => startCountdown());
</script>
</body>
</html>
